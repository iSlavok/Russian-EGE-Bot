services:
  bot-dev:
    build: .
    profiles: [ "dev" ]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/bot:/src/bot
      - ./src/app:/src/app
      - ./src/main.py:/src/main.py
      - ./migrations:/src/migrations
      - ./logs:/src/logs
    networks: [ bot_network ]

  bot-prod:
    image: ghcr.io/islavok/russian-ege-bot:latest
    profiles: [ "prod" ]
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bot_logs:/src/logs
    networks: [ bot_network ]

  bot-migrate:
    build: .
    profiles: [ "migrate" ]
    env_file: .env
    command: tail -f /dev/null
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/bot:/src/bot
      - ./src/app:/src/app
      - ./src/main.py:/src/main.py
      - ./migrations:/src/migrations
      - ./alembic.ini:/src/alembic.ini
    networks: [ bot_network ]

  postgres-test:
    image: postgres:17
    profiles: [ "test" ]
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ bot_network ]

  bot-test:
    build:
      dockerfile: Dockerfile.test
    profiles: [ "test" ]
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: "postgresql+asyncpg://test:test@postgres-test:5432/test_db"
    volumes:
      - ./coverage:/src/coverage
      - ./src:/src/src
      - ./tests:/src/tests
      - ./pyproject.toml:/src/pyproject.toml
    networks: [ bot_network ]

  postgres:
    image: postgres:17
    profiles: [ "dev", "prod", "migrate" ]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_network
    ports:
      - "5439:5432"

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    profiles: [ "dev", "prod" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - bot_network
    ports:
      - "6367:6379"

volumes:
  postgres_data:
  redis_data:
  bot_logs:

networks:
  bot_network:
    driver: bridge