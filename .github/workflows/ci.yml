name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dev deps
        run: uv sync --frozen --no-install-project --group dev

      - name: Ruff check
        run: uv run --no-sync ruff check

  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --no-install-project --group dev

      - name: Pyright
        run: uv run --no-sync pyright

  pytest:
    name: Pytest (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: >
          docker compose --profile test up
          --build --abort-on-container-exit --exit-code-from bot-test

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/coverage.xml
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --profile test down -v
